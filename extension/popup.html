<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=380">
    <title>SecureAuth</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Setup screen -->
    <div id="setup" class="hidden">
        <div class="header">
            <div class="logo">
                <span class="shield-icon">🛡</span>
                <span class="brand">SecureAuth</span>
            </div>
        </div>
        <div class="content">
            <h2>Connect your account</h2>
            <p>Paste your connection token from the Security Settings page.</p>
            <textarea id="token-input" placeholder="Paste token here..." rows="3"></textarea>
            <div class="error hidden" id="setup-error"></div>
            <button id="connect-btn" class="btn primary">Connect</button>
        </div>
    </div>

    <!-- Codes screen -->
    <div id="codes-view" class="hidden">
        <div class="header">
            <div class="logo">
                <span class="shield-icon">🛡</span>
                <span class="brand">SecureAuth</span>
            </div>
            <button id="refresh-btn" class="icon-btn" title="Refresh">↻</button>
            <button id="disconnect-btn" class="icon-btn danger" title="Disconnect">✕</button>
        </div>
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search accounts...">
        </div>
        <div id="account-list" class="account-list"></div>
        <div id="empty-state" class="empty hidden">
            <p>No codes yet.</p>
            <button id="add-link" class="btn secondary">Add accounts in SecureAuth</button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
